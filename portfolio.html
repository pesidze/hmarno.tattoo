  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #fff;
      color: #0d0d0d;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 56px;
      background: #fff;
      border-bottom: 1px solid #f0f0f0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .nav-logo img {
      display: block;
      height: 28px;
      width: auto;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-cta {
      padding: 9px 18px;
      background: #0d0d0d;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav-burger {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 36px;
      height: 36px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      flex-shrink: 0;
    }

    .nav-burger span {
      display: block;
      width: 100%;
      height: 1.5px;
      background: #0d0d0d;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    nav.nav-open .nav-burger span:nth-child(1) {
      transform: translateY(6.5px) rotate(45deg);
    }
    nav.nav-open .nav-burger span:nth-child(2) {
      opacity: 0;
    }
    nav.nav-open .nav-burger span:nth-child(3) {
      transform: translateY(-6.5px) rotate(-45deg);
    }

    .nav-links {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #fff;
      border-bottom: 1px solid #f0f0f0;
      padding: 8px 20px 16px;
      flex-direction: column;
      list-style: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }

    nav.nav-open .nav-links {
      display: flex;
    }

    .nav-links li {
      border-bottom: 1px solid #f0f0f0;
    }

    .nav-links li:last-child {
      border-bottom: none;
    }

    .nav-links a {
      display: block;
      padding: 14px 0;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #0d0d0d;
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .nav-links a:hover { opacity: 1; }
    .nav-links a.active { opacity: 1; }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 56px 20px 48px;
      border-bottom: 1px solid #f0f0f0;
    }

    .page-header-inner {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .page-heading {
      font-size: 72px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      color: #0d0d0d;
    }

    .page-meta {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .page-sub {
      font-size: 14px;
      font-weight: 300;
      color: #888;
      line-height: 1.65;
      max-width: 360px;
    }

    .page-instagram-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      color: #0d0d0d;
      text-decoration: none;
      letter-spacing: 0.04em;
      border-bottom: 1px solid #0d0d0d;
      padding-bottom: 1px;
      width: fit-content;
      transition: opacity 0.2s;
    }

    .page-instagram-link:hover { opacity: 0.6; }

    /* ── PHOTO GRID ── */
    .portfolio-body {
      padding: 0;
    }

    .photo-grid {
      columns: 2;
      column-gap: 2px;
    }

    .photo-grid img {
      width: 100%;
      display: block;
      margin-bottom: 2px;
    }

    @media (min-width: 768px) {
      .photo-grid { columns: 3; }
    }

    @media (min-width: 1200px) {
      .photo-grid { columns: 4; }
    }

    /* ── FOOTER ── */
    footer {
      padding: 36px 20px;
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .footer-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-logo {
      font-family: 'Permanent Marker', cursive;
      font-size: 20px;
      color: #fff;
      text-decoration: none;
    }

    .footer-instagram {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.2s;
    }

    .footer-instagram:hover { color: #fff; }

    .footer-bottom {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.05em;
    }

    /* ── DESKTOP ── */
    @media (min-width: 768px) {
      nav {
        height: 64px;
        padding: 0 56px;
      }

      .nav-logo { font-size: 24px; }
      .nav-links { gap: 40px; }

      .page-header {
        padding: 72px 56px 56px;
      }

      .page-header-inner {
        flex-direction: row;
        align-items: flex-end;
        justify-content: space-between;
      }

      .page-heading { font-size: 96px; }

      .page-meta {
        align-items: flex-end;
        text-align: right;
        flex-shrink: 0;
        padding-bottom: 8px;
      }

      .page-sub { max-width: 300px; text-align: right; }

      footer {
        padding: 44px 56px;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }

      .footer-top { flex: 1; }
      .footer-bottom { text-align: right; }
    }

    @media (min-width: 1200px) {
      nav { padding: 0 80px; }
      .page-header { padding: 80px 80px 64px; }
      .page-heading { font-size: 120px; }
      footer { padding: 44px 80px; }
    }

  <script>
    function toggleNav() {
      document.querySelector('nav').classList.toggle('nav-open');
    }
    document.addEventListener('click', function(e) {
      if (!e.target.closest('nav')) {
        document.querySelector('nav').classList.remove('nav-open');
      }
    });
    document.querySelectorAll('.nav-links a').forEach(function(a) {
      a.addEventListener('click', function() {
        document.querySelector('nav').classList.remove('nav-open');
      });
    });
  </script>
